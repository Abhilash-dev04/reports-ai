services:
  - type: web
    name: reports-ai
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd /opt/render/project/src && PYTHONPATH=/opt/render/project/src python backend/main.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_ADMIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: MODEL_PATH
        value: ./models/all-MiniLM-L6-v2.onnx
      - key: EXCEL_SOURCE_PATH
        value: ./data/source_reports.xlsx
